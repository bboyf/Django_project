{% extends 'base.html' %}

{% block title %}用户登录 - 教师评价系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="content-card">
            <h2 class="text-center mb-4">
                <i class="fas fa-sign-in-alt"></i> 用户登录
            </h2>
            
            {% if hint %}
            <div class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle"></i> {{ hint }}
            </div>
            {% endif %}
            
            <form action="/login/" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> 用户名
                    </label>
                    <input type="text" class="form-control form-control-lg" 
                           id="username" name="username" required 
                           placeholder="请输入用户名">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control form-control-lg" 
                           id="password" name="password" required 
                           placeholder="请输入密码">
                </div>
                
                <div class="mb-4">
                    <label for="captcha" class="form-label">
                        <i class="fas fa-shield-alt"></i> 验证码
                    </label>
                    <div class="input-group">
                        <input type="text" class="form-control form-control-lg" 
                               id="captcha" name="captcha" required 
                               placeholder="请输入验证码" autocomplete="off">
                        <img src="" alt="验证码" 
                             id="captcha-img" 
                             style="height: 48px; cursor: pointer; border-radius: 0 8px 8px 0;"
                             title="点击刷新验证码">
                    </div>
                    <small class="text-muted">看不清？点击验证码图片刷新</small>
                </div>
                
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </div>
                
                <div class="text-center">
                    <a href="/" class="text-decoration-none me-3">
                        <i class="fas fa-home"></i> 返回首页
                    </a>
                    <a href="/register/" class="text-decoration-none">
                        <i class="fas fa-user-plus"></i> 注册新用户
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    // 页面加载时生成验证码
    function refreshCaptcha() {
        $('#captcha-img').attr('src', '/captcha/?t=' + new Date().getTime());
    }
    
    // 初始加载验证码
    refreshCaptcha();
    
    // 点击验证码图片刷新
    $('#captcha-img').click(function() {
        refreshCaptcha();
        // 清空验证码输入框
        $('#captcha').val('').focus();
    });
    
    // 表单提交失败后自动刷新验证码
    {% if hint %}
    refreshCaptcha();
    {% endif %}
});
</script>
{% endblock %}
